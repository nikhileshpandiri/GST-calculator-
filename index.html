<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            background: #eef;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GST Calculator</h2>

    <label>Amount (₹)</label>
    <input type="number" id="amount" placeholder="Enter amount">

    <label>GST Rate (%)</label>
    <select id="gstRate">
        <option value="5">5%</option>
        <option value="12">12%</option>
        <option value="18">18%</option>
        <option value="28">28%</option>
    </select>

    <button onclick="calculateGST()">Calculate</button>

    <div class="result" id="result">
        Enter values and click Calculate.
    </div>
</div>

<script>
function calculateGST() {
    let amount = parseFloat(document.getElementById("amount").value);
    let gstRate = parseFloat(document.getElementById("gstRate").value);

    if (isNaN(amount) || amount <= 0) {
        document.getElementById("result").innerHTML =
            "Please enter a valid amount.";
        return;
    }

    let gstAmount = (amount * gstRate) / 100;
    let totalAmount = amount + gstAmount;

    document.getElementById("result").innerHTML = `
        <strong>Base Amount:</strong> ₹${amount.toFixed(2)}<br>
        <strong>GST (${gstRate}%):</strong> ₹${gstAmount.toFixed(2)}<br>
        <strong>Total Amount:</strong> ₹${totalAmount.toFixed(2)}
    `;
}
</script>

</body>
</html>
